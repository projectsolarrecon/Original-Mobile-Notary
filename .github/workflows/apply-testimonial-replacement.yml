name: Apply homepage trust section replacement

on:
  push:
    branches:
      - content/replace-placeholder-testimonials

permissions:
  contents: write

jobs:
  update-homepage:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: content/replace-placeholder-testimonials

      - name: Replace placeholder testimonials
        shell: python
        run: |
          from pathlib import Path

          path = Path("src/pages/Home.tsx")
          text = path.read_text()

          old_data = '''const testimonials = [
            {
              name: "Sarah M.",
              text: "She came to my house on a Saturday evening to notarize my power of attorney. So professional and kind — I couldn't believe how easy it was!",
              stars: 5,
            },
            {
              name: "James T.",
              text: "Used her for a real estate closing. She was on time, prepared, and made the whole process stress-free. Will definitely use again.",
              stars: 5,
            },
            {
              name: "Linda R.",
              text: "I needed documents notarized at my mom's care facility. She was so patient and compassionate. Highly recommend!",
              stars: 5,
            },
          ];'''

          new_data = '''const servicePromises = [
            {
              icon: "💬",
              title: "Clear Communication",
              text: "You will know what to bring, where to meet, and what the appointment will cost before it begins.",
            },
            {
              icon: "🤝",
              title: "Patient, Personal Service",
              text: "Every appointment is handled with care, especially when working with seniors, families, hospital patients, and people navigating important documents.",
            },
            {
              icon: "📍",
              title: "Reliable and Convenient",
              text: "Brigitte works to accommodate busy schedules, arrives prepared, and brings professional notary service directly to the customer.",
            },
          ];'''

          old_section = '''      {/* ═══════════════════════════════════════
          TESTIMONIALS
      ═══════════════════════════════════════ */}
      <section className="py-20 md:py-28 bg-forest relative overflow-hidden">
        <CornerLeaves color="#7A9E8E" className="absolute top-0 left-0 opacity-10 w-48 h-48" />
        <CornerLeaves color="#7A9E8E" flip className="absolute bottom-0 right-0 opacity-10 w-48 h-48 rotate-180" />

        <div className="relative max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
          <motion.div
            initial="hidden"
            whileInView="visible"
            viewport={{ once: true }}
            variants={fadeUp}
            className="text-center mb-4"
          >
            <span className="font-body text-terra-light font-bold text-xs uppercase tracking-[0.2em]">Reviews</span>
          </motion.div>
          <motion.h2
            initial="hidden"
            whileInView="visible"
            viewport={{ once: true }}
            variants={fadeUp}
            className="font-display text-3xl md:text-4xl font-bold text-cream text-center mb-3"
          >
            What Clients Are Saying
          </motion.h2>
          <motion.p
            initial="hidden"
            whileInView="visible"
            viewport={{ once: true }}
            variants={fadeUp}
            className="font-body text-sage-light text-center max-w-md mx-auto mb-4"
          >
            Real reviews from real Nashville neighbors
          </motion.p>

          <BotanicalDivider color="#7A9E8E" className="max-w-xs mx-auto mb-14 opacity-40" />

          <div className="grid md:grid-cols-3 gap-6">
            {testimonials.map((t, i) => (
              <motion.div
                key={t.name}
                custom={i}
                initial="hidden"
                whileInView="visible"
                viewport={{ once: true }}
                variants={fadeUp}
                className="bg-cream/8 backdrop-blur rounded-3xl p-7 border border-sage-mid/20 hover:border-sage-mid/40 transition-colors"
              >
                {/* Stars */}
                <div className="flex gap-1 mb-4">
                  {Array.from({ length: t.stars }).map((_, j) => (
                    <svg key={j} className="w-4 h-4 text-terra-light" fill="currentColor" viewBox="0 0 20 20">
                      <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
                    </svg>
                  ))}
                </div>

                {/* Quote mark */}
                <div className="font-display text-sage-mid text-5xl leading-none mb-2 opacity-40">"</div>

                <p className="font-body text-sage-light text-sm leading-relaxed mb-5 italic">
                  {t.text}
                </p>

                <div className="flex items-center gap-3 pt-4 border-t border-sage-mid/20">
                  <div className="w-9 h-9 rounded-full bg-terra/20 border border-terra/30 flex items-center justify-center font-display text-terra-light font-bold text-sm">
                    {t.name[0]}
                  </div>
                  <div>
                    <p className="font-body text-cream font-semibold text-sm">{t.name}</p>
                    <p className="font-body text-sage text-xs flex items-center gap-1">
                      <svg className="w-3 h-3" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z" />
                      </svg>
                      Google Review
                    </p>
                  </div>
                </div>
              </motion.div>
            ))}
          </div>
        </div>
      </section>'''

          new_section = '''      {/* ═══════════════════════════════════════
          SERVICE PROMISES
      ═══════════════════════════════════════ */}
      <section className="py-20 md:py-28 bg-forest relative overflow-hidden">
        <CornerLeaves color="#7A9E8E" className="absolute top-0 left-0 opacity-10 w-48 h-48" />
        <CornerLeaves color="#7A9E8E" flip className="absolute bottom-0 right-0 opacity-10 w-48 h-48 rotate-180" />

        <div className="relative max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
          <motion.div
            initial="hidden"
            whileInView="visible"
            viewport={{ once: true }}
            variants={fadeUp}
            className="text-center mb-4"
          >
            <span className="font-body text-terra-light font-bold text-xs uppercase tracking-[0.2em]">What You Can Expect</span>
          </motion.div>
          <motion.h2
            initial="hidden"
            whileInView="visible"
            viewport={{ once: true }}
            variants={fadeUp}
            className="font-display text-3xl md:text-4xl font-bold text-cream text-center mb-3"
          >
            A Service Experience Built Around You
          </motion.h2>
          <motion.p
            initial="hidden"
            whileInView="visible"
            viewport={{ once: true }}
            variants={fadeUp}
            className="font-body text-sage-light text-center max-w-3xl mx-auto mb-4 leading-relaxed"
          >
            Original Mobile Notary is a new business, but attentive customer service is not new to Brigitte. She brings years of experience serving customers in their homes and businesses with patience, reliability, honesty, clear communication, and personalized service.
          </motion.p>

          <BotanicalDivider color="#7A9E8E" className="max-w-xs mx-auto mb-14 opacity-40" />

          <div className="grid md:grid-cols-3 gap-6">
            {servicePromises.map((promise, i) => (
              <motion.div
                key={promise.title}
                custom={i}
                initial="hidden"
                whileInView="visible"
                viewport={{ once: true }}
                variants={fadeUp}
                className="bg-cream/8 backdrop-blur rounded-3xl p-7 border border-sage-mid/20 hover:border-sage-mid/40 hover:-translate-y-1 transition-all"
              >
                <div className="w-12 h-12 rounded-2xl bg-terra/20 border border-terra/30 flex items-center justify-center text-2xl mb-5">
                  {promise.icon}
                </div>
                <h3 className="font-display text-cream font-semibold text-xl mb-3">
                  {promise.title}
                </h3>
                <p className="font-body text-sage-light text-sm leading-relaxed">
                  {promise.text}
                </p>
              </motion.div>
            ))}
          </div>
        </div>
      </section>'''

          if old_data not in text:
              raise SystemExit("Could not locate testimonial data block")
          if old_section not in text:
              raise SystemExit("Could not locate testimonial section")

          text = text.replace(old_data, new_data).replace(old_section, new_section)
          path.write_text(text)

      - name: Remove temporary workflow and commit
        run: |
          rm .github/workflows/apply-testimonial-replacement.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/pages/Home.tsx .github/workflows/apply-testimonial-replacement.yml
          git commit -m "Replace placeholder testimonials with service promises"
          git push
